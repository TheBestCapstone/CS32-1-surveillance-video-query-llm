<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stage 1 Architecture – Surveillance Video Event Pipeline</title>
<style>
  body { margin: 0; background: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; padding: 30px 0 60px; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="980" height="920" viewBox="0 0 980 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="980" height="56" fill="#1e293b"/>
  <text x="490" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="white">Stage 1 — Offline Video Understanding Pipeline</text>
  <text x="490" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">Surveillance Video  →  Structured Event JSON</text>

  <!-- ─── INPUT ─────────────────────────────────────────────── -->
  <rect x="370" y="80" width="240" height="54" rx="10" fill="#1e293b" filter="url(#shadow)"/>
  <text x="490" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📹  Input Video</text>
  <text x="490" y="120" text-anchor="middle" font-size="11" fill="#94a3b8">Surveillance footage (.mp4)</text>

  <!-- arrow down -->
  <line x1="490" y1="134" x2="490" y2="158" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ─── COORDINATOR BOX ─────────────────────────────────── -->
  <rect x="30" y="160" width="920" height="580" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="60" y="185" font-size="12" font-weight="bold" fill="#64748b">coordinator.py  —  Pipeline Orchestrator</text>

  <!-- ─── STEP 1: VISION ────────────────────────────────────── -->
  <rect x="55" y="195" width="870" height="155" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="55" y="195" width="870" height="30" rx="10" fill="#3b82f6"/>
  <rect x="55" y="210" width="870" height="15" fill="#3b82f6"/>
  <text x="490" y="216" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Step 1 — Object Detection &amp; Tracking   (vision.py)</text>

  <!-- Sub-boxes inside vision -->
  <!-- YOLOv8 -->
  <rect x="75" y="237" width="240" height="98" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="195" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">YOLOv8 Detection</text>
  <text x="195" y="277" text-anchor="middle" font-size="10.5" fill="#374151">Model weights: n / s / m / l / x</text>
  <text x="195" y="293" text-anchor="middle" font-size="10.5" fill="#374151">Conf threshold: 0.25</text>
  <text x="195" y="309" text-anchor="middle" font-size="10.5" fill="#374151">IoU (NMS): 0.45</text>
  <text x="195" y="326" text-anchor="middle" font-size="10.5" fill="#374151">Classes: car, person, truck…</text>

  <!-- arrow -->
  <line x1="315" y1="286" x2="345" y2="286" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Tracker -->
  <rect x="345" y="237" width="260" height="98" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="475" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">Multi-Object Tracker</text>
  <text x="475" y="278" text-anchor="middle" font-size="10.5" fill="#374151">BoT-SORT + ReID  (default)</text>
  <text x="475" y="294" text-anchor="middle" font-size="10.5" fill="#374151">BoT-SORT  /  ByteTrack</text>
  <text x="475" y="310" text-anchor="middle" font-size="10.5" fill="#374151">persist=True, stream=True</text>
  <text x="475" y="326" text-anchor="middle" font-size="10.5" fill="#6b7280">config: botsort_reid.yaml</text>

  <!-- arrow -->
  <line x1="605" y1="286" x2="635" y2="286" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- Output of vision -->
  <rect x="635" y="237" width="270" height="98" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="770" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">Frame Detections</text>
  <text x="770" y="276" text-anchor="middle" font-size="10.5" fill="#374151">Per-frame list of tuples:</text>
  <text x="770" y="292" text-anchor="middle" font-size="10" fill="#1e40af" font-family="monospace">(track_id, class_name,</text>
  <text x="770" y="308" text-anchor="middle" font-size="10" fill="#1e40af" font-family="monospace"> conf, bbox_xyxy)</text>
  <text x="770" y="325" text-anchor="middle" font-size="10.5" fill="#374151">fps  +  total_frames</text>

  <!-- Arrow down to step 2 -->
  <line x1="490" y1="350" x2="490" y2="374" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ─── STEP 2: ANALYZER ──────────────────────────────────── -->
  <rect x="55" y="375" width="870" height="200" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="55" y="375" width="870" height="30" rx="10" fill="#10b981"/>
  <rect x="55" y="390" width="870" height="15" fill="#10b981"/>
  <text x="490" y="396" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Step 2 — Track Aggregation &amp; Event Slicing   (analyzer.py)</text>

  <!-- aggregate_tracks -->
  <rect x="75" y="418" width="250" height="138" rx="8" fill="white" stroke="#6ee7b7" stroke-width="1.2"/>
  <text x="200" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">aggregate_tracks()</text>
  <text x="200" y="458" text-anchor="middle" font-size="10.5" fill="#374151">Group detections by track_id</text>
  <text x="200" y="474" text-anchor="middle" font-size="10.5" fill="#374151">Compute per-track:</text>
  <text x="200" y="490" text-anchor="middle" font-size="10" fill="#065f46" font-family="monospace">start/end_time, positions</text>
  <text x="200" y="506" text-anchor="middle" font-size="10" fill="#065f46" font-family="monospace">motion_score (avg Δpx)</text>
  <text x="200" y="522" text-anchor="middle" font-size="10" fill="#065f46" font-family="monospace">time_xyxy, bbox history</text>
  <text x="200" y="542" text-anchor="middle" font-size="10" fill="#6b7280">→ Track trajectory list</text>

  <!-- arrow -->
  <line x1="325" y1="487" x2="355" y2="487" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- slice_events -->
  <rect x="355" y="418" width="310" height="138" rx="8" fill="white" stroke="#6ee7b7" stroke-width="1.2"/>
  <text x="510" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">slice_events()</text>
  <text x="510" y="457" text-anchor="middle" font-size="10.5" fill="#374151">Sliding motion-window analysis</text>
  <text x="510" y="471" text-anchor="middle" font-size="10.5" fill="#374151">→ classify each track into:</text>
  <rect x="370" y="478" width="280" height="16" rx="3" fill="#d1fae5"/>
  <text x="510" y="490" text-anchor="middle" font-size="10" fill="#065f46" font-family="monospace">motion_segment</text>
  <rect x="370" y="496" width="280" height="16" rx="3" fill="#d1fae5"/>
  <text x="510" y="508" text-anchor="middle" font-size="10" fill="#065f46" font-family="monospace">presence_after_motion</text>
  <rect x="370" y="514" width="280" height="16" rx="3" fill="#d1fae5"/>
  <text x="510" y="526" text-anchor="middle" font-size="10" fill="#065f46" font-family="monospace">appearance / disappearance</text>
  <rect x="370" y="532" width="280" height="16" rx="3" fill="#d1fae5"/>
  <text x="510" y="544" text-anchor="middle" font-size="10" fill="#065f46" font-family="monospace">presence_static</text>

  <!-- arrow -->
  <line x1="665" y1="487" x2="695" y2="487" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow-green)"/>

  <!-- Output events+clips -->
  <rect x="695" y="418" width="210" height="138" rx="8" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.2"/>
  <text x="800" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">Raw Outputs</text>
  <text x="800" y="460" text-anchor="middle" font-size="11" fill="#374151">events[]</text>
  <text x="800" y="476" text-anchor="middle" font-size="10" fill="#374151">(type, track_id, class,</text>
  <text x="800" y="492" text-anchor="middle" font-size="10" fill="#374151">start/end_time, bbox,</text>
  <text x="800" y="508" text-anchor="middle" font-size="10" fill="#374151">motion_level, desc)</text>
  <line x1="720" y1="520" x2="880" y2="520" stroke="#6ee7b7" stroke-width="1"/>
  <text x="800" y="536" text-anchor="middle" font-size="11" fill="#374151">clip_segments[]</text>
  <text x="800" y="550" text-anchor="middle" font-size="10" fill="#374151">(start_sec, end_sec)</text>

  <!-- Arrow down to step 3 -->
  <line x1="490" y1="575" x2="490" y2="599" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ─── STEP 3: LLM REFINEMENT ─────────────────────────── -->
  <rect x="55" y="600" width="870" height="128" rx="10" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="55" y="600" width="870" height="30" rx="10" fill="#8b5cf6"/>
  <rect x="55" y="615" width="870" height="15" fill="#8b5cf6"/>
  <text x="490" y="621" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Step 3 — LLM Multimodal Event Refinement   (event_refinement_llm.py)</text>

  <!-- Frame sampling box -->
  <rect x="75" y="642" width="200" height="76" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="175" y="663" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d28d9">Frame Sampling</text>
  <text x="175" y="681" text-anchor="middle" font-size="10.5" fill="#374151">Uniformly sample N frames</text>
  <text x="175" y="697" text-anchor="middle" font-size="10.5" fill="#374151">per clip (default N=12)</text>
  <text x="175" y="712" text-anchor="middle" font-size="10" fill="#6b7280">Base64-encoded JPEG</text>

  <line x1="275" y1="680" x2="305" y2="680" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#arrow-purple)"/>

  <!-- GPT-4o box -->
  <rect x="305" y="642" width="280" height="76" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="445" y="663" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d28d9">GPT-4o-mini  (Multimodal)</text>
  <text x="445" y="681" text-anchor="middle" font-size="10.5" fill="#374151">Input: raw events JSON + key frames</text>
  <text x="445" y="697" text-anchor="middle" font-size="10.5" fill="#374151">LangChain PydanticOutputParser</text>
  <text x="445" y="712" text-anchor="middle" font-size="10" fill="#6b7280">temp=0.1 | strict JSON schema</text>

  <line x1="585" y1="680" x2="615" y2="680" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#arrow-purple)"/>

  <!-- Two modes -->
  <rect x="615" y="630" width="295" height="90" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text x="762" y="650" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d28d9">Refinement Modes</text>
  <!-- mode full -->
  <rect x="625" y="656" width="128" height="54" rx="5" fill="white" stroke="#c4b5fd" stroke-width="1"/>
  <text x="689" y="672" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#6d28d9">"full" mode</text>
  <text x="689" y="687" text-anchor="middle" font-size="9.5" fill="#374151">scene context</text>
  <text x="689" y="701" text-anchor="middle" font-size="9.5" fill="#374151">entity dedup + appearance</text>
  <!-- mode vector -->
  <rect x="768" y="656" width="132" height="54" rx="5" fill="white" stroke="#c4b5fd" stroke-width="1"/>
  <text x="834" y="672" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#6d28d9">"vector" mode</text>
  <text x="834" y="687" text-anchor="middle" font-size="9.5" fill="#374151">event_text_cn</text>
  <text x="834" y="701" text-anchor="middle" font-size="9.5" fill="#374151">keywords + color</text>

  <!-- ─── OUTPUTS ──────────────────────────────────────────── -->
  <!-- Arrow down from coordinator -->
  <line x1="490" y1="740" x2="490" y2="764" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Three output boxes -->
  <rect x="55" y="765" width="270" height="72" rx="10" fill="#1e293b" filter="url(#shadow)"/>
  <text x="190" y="790" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📄  *_events.json</text>
  <text x="190" y="809" text-anchor="middle" font-size="10.5" fill="#94a3b8">Raw events list</text>
  <text x="190" y="826" text-anchor="middle" font-size="10.5" fill="#94a3b8">+ pipeline meta</text>

  <rect x="355" y="765" width="270" height="72" rx="10" fill="#1e293b" filter="url(#shadow)"/>
  <text x="490" y="790" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📄  *_clips.json</text>
  <text x="490" y="809" text-anchor="middle" font-size="10.5" fill="#94a3b8">Clip time segments</text>
  <text x="490" y="826" text-anchor="middle" font-size="10.5" fill="#94a3b8">(start_sec, end_sec)</text>

  <rect x="655" y="765" width="270" height="72" rx="10" fill="#1e293b" filter="url(#shadow)"/>
  <text x="790" y="790" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📄  *_refined_events.json</text>
  <text x="790" y="809" text-anchor="middle" font-size="10.5" fill="#94a3b8">LLM-enriched events</text>
  <text x="790" y="826" text-anchor="middle" font-size="10.5" fill="#94a3b8">→ Stage 2 indexing input</text>

  <!-- Arrow to Stage 2 -->
  <line x1="790" y1="837" x2="790" y2="860" stroke="#e11d48" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <rect x="590" y="860" width="400" height="40" rx="8" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="790" y="885" text-anchor="middle" font-size="12" font-weight="bold" fill="#e11d48">→ Stage 2: Indexing &amp; Query Agent</text>

  <!-- Legend -->
  <rect x="55" y="860" width="480" height="40" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="72" y="874" width="14" height="12" rx="2" fill="#3b82f6"/>
  <text x="92" y="884" font-size="10.5" fill="#374151">Detection &amp; Tracking</text>
  <rect x="202" y="874" width="14" height="12" rx="2" fill="#10b981"/>
  <text x="222" y="884" font-size="10.5" fill="#374151">Event Analysis</text>
  <rect x="312" y="874" width="14" height="12" rx="2" fill="#8b5cf6"/>
  <text x="332" y="884" font-size="10.5" fill="#374151">LLM Refinement</text>
  <rect x="430" y="874" width="14" height="12" rx="2" fill="#1e293b"/>
  <text x="450" y="884" font-size="10.5" fill="#374151">JSON Output</text>
</svg>
</body>
</html>

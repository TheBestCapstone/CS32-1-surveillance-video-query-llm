<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg"
     width="1080" height="530"
     viewBox="0 0 1080 530"
     style="display:block;font-family:'Segoe UI',Arial,sans-serif;">

  <rect width="1080" height="44" fill="#1C2B4A" rx="10"/>

  <!-- ════════════════════════════════════════════

  <!-- ════════════════════════════════════════════

  <rect x="14" y="70" width="134" height="85" rx="8" fill="#fff" stroke="#0D9488" stroke-width="1.5"/>

       STEP 1 — YOLOv8
  ════════════════════════════════════════════ -->

  <text x="259" y="122" text-anchor="middle" font-size="10" fill="#475569">yolov8n/s/m/l/x</text>
  <text x="259" y="136" text-anchor="middle" font-size="10" fill="#475569">conf=0.25 · iou=0.45</text>

  <polygon points="368,116 358,111 358,121" fill="#0D9488"/>

  ════════════════════════════════════════════ -->

  <text x="452" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#1C2B4A">Multi-Object Tracking</text>
  <text x="452" y="122" text-anchor="middle" font-size="10" fill="#475569">tracker: botsort_reid</text>
  <text x="452" y="136" text-anchor="middle" font-size="10" fill="#475569">output per frame:</text>
  <text x="452" y="150" text-anchor="middle" font-size="10" fill="#475569">(track_id, class, conf, bbox)</text>

  <polygon points="566,116 556,111 556,121" fill="#0D9488"/>

  ════════════════════════════════════════════ -->

  <text x="832" y="267" text-anchor="middle" font-size="10" fill="#475569">mode: full</text>
  <text x="832" y="281" text-anchor="middle" font-size="10" fill="#475569">entity dedup + scene narration</text>
  <text x="832" y="295" text-anchor="middle" font-size="10" fill="#475569">mode: vector</text>

  <text x="925" y="449" text-anchor="middle" font-size="10" fill="#475569">multi_camera.py schema</text>

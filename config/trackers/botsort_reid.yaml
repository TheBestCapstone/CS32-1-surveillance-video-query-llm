# BoT-SORT + ReID（本仓库对 Ultralytics 默认 botsort 的变体）
# 参考: https://github.com/ultralytics/ultralytics/blob/main/ultralytics/cfg/trackers/botsort.yaml

tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 100
match_thresh: 0.6
fuse_score: True

gmc_method: sparseOptFlow

proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: True
model: auto

openapi: 3.0.0
info:
  title: Video Events API
  version: 1.0.0
  description: API for retrieving video events data, designed for Apifox Mock
paths:
  /api/v1/video/events:
    get:
      summary: List video events
      description: Return event rows for an optional video_id filter
      parameters:
        - in: query
          name: video_id
          schema:
            type: string
          description: Video id, e.g. VIRAT_S_000200_00_000100_000171.mp4
      responses:
        '200':
          description: Success response with event payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  video_id:
                    type: string
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        video_id:
                          type: string
                        clip_start_sec:
                          type: number
                        clip_end_sec:
                          type: number
                        start_time:
                          type: number
                        end_time:
                          type: number
                        object_type:
                          type: string
                        object_color:
                          type: string
                        appearance_notes:
                          type: string
                        scene_zone:
                          type: string
                        event_text:
                          type: string
                        keywords:
                          type: array
                          items:
                            type: string
                        start_bbox_xyxy:
                          type: array
                          items:
                            type: number
                        end_bbox_xyxy:
                          type: array
                          items:
                            type: number
                        entity_hint:
                          type: string

openapi: 3.0.0
info:
  title: Video Events API
  version: 1.0.0
  description: API for retrieving video events data, designed for Apifox Mock
paths:
  /api/v1/video/events:
    get:
      summary: 获取视频事件列表
      description: 根据提供的参数返回视频中的事件列表
      parameters:
        - in: query
          name: video_id
          schema:
            type: string
          description: 视频 ID，例如 VIRAT_S_000200_00_000100_000171.mp4
      responses:
        '200':
          description: 成功返回事件数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  video_id:
                    type: string
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        video_id:
                          type: string
                        clip_start_sec:
                          type: number
                        clip_end_sec:
                          type: number
                        start_time:
                          type: number
                        end_time:
                          type: number
                        object_type:
                          type: string
                        object_color_cn:
                          type: string
                        appearance_notes_cn:
                          type: string
                        scene_zone_cn:
                          type: string
                        event_text_cn:
                          type: string
                        keywords:
                          type: array
                          items:
                            type: string
                        start_bbox_xyxy:
                          type: array
                          items:
                            type: number
                        end_bbox_xyxy:
                          type: array
                          items:
                            type: number
                        entity_hint:
                          type: string
